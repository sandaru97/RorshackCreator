<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Synth-Doo</title>
    <style>
        body { background: #1a0f08; color: #f3e5ab; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; background: rgba(0, 0, 0, 0.9); padding: 40px; border-radius: 40px; border: 2px solid #5d2e0c; width: 320px; box-shadow: 0 0 60px #000; }
        h2 { letter-spacing: 4px; color: #ff7b00; margin-bottom: 5px; }
        p { font-size: 10px; margin-bottom: 25px; opacity: 0.7; }
        #visualizer { width: 100px; height: 100px; border-radius: 50%; background: #ff7b00; margin: 30px auto; opacity: 0.1; box-shadow: 0 0 40px #ff7b00; transition: transform 0.05s; border: 4px solid #5d2e0c; }
        button { padding: 20px 40px; font-size: 1.1rem; background: #8b4513; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 0 #4e270b; transition: 0.2s; }
        button:hover { background: #a0522d; }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #4e270b; }
        .controls { margin-top: 30px; display: none; text-align: left; }
        label { font-size: 10px; display: block; margin-bottom: 5px; color: #a08c7d; }
        input { width: 100%; accent-color: #ff7b00; margin-bottom: 15px; }
        #status { margin-top: 20px; font-size: 0.75rem; color: #8b4513; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h2>SYNTH-DOO</h2>
    <p>PHYSICAL MODELING ENGINE</p>
    <div id="visualizer"></div>
    <button id="startButton">WAKE THE SPIRIT</button>
    <div id="status">Awaiting Input...</div>
    
    <div class="controls" id="settings">
        <label>MIC SENSITIVITY (NOISE GATE)</label>
        <input type="range" id="threshold" min="5" max="60" value="20">
        
        <label>RESONANCE (THE "WAH")</label>
        <input type="range" id="resonance" min="5" max="25" value="15">
    </div>
</div>

<script>
    let audioCtx, analyser, gainNode, dataArray, formantFilter;
    let isRunning = false;

    // Create a distortion curve to simulate wood vibration
    function makeDistortionCurve(amount) {
        let k = typeof amount === 'number' ? amount : 50,
            n_samples = 44100,
            curve = new Float32Array(n_samples),
            deg = Math.PI / 180, i = 0, x;
        for ( ; i < n_samples; ++i ) {
            x = i * 2 / n_samples - 1;
            curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) );
        }
        return curve;
    }

    document.getElementById('startButton').addEventListener('click', async () => {
        if (isRunning) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
            });

            // Input handling
            const micSource = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            micSource.connect(analyser);

            // 1. SOUND SOURCE: Deep Sawtooth
            const osc = audioCtx.createOscillator();
            osc.type = "sawtooth";
            osc.frequency.value = 65.41; // Low C

            // 2. WARMTH: Low-pass to remove "plastic" highs
            const warmth = audioCtx.createBiquadFilter();
            warmth.type = "lowpass";
            warmth.frequency.value = 600;

            // 3. GRIT: Waveshaper for the "Growl"
            const dist = audioCtx.createWaveShaper();
            dist.curve = makeDistortionCurve(300);

            // 4. FORMANT: Bandpass filter that creates the mouth-shape sound
            formantFilter = audioCtx.createBiquadFilter();
            formantFilter.type = "bandpass";
            formantFilter.frequency.value = 180;
            formantFilter.Q.value = 15;

            // 5. OUTPUT
            gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);

            // Chain: Osc -> Warmth -> Distortion -> Formant -> Gain -> Out
            osc.connect(warmth);
            warmth.connect(dist);
            dist.connect(formantFilter);
            formantFilter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();

            // UI logic
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            document.getElementById('startButton').style.display = 'none';
            document.getElementById('settings').style.display = 'block';
            document.getElementById('status').innerText = "BLOW INTO MIC";
            
            isRunning = true;
            tick();

        } catch (err) {
            document.getElementById('status').innerText = "ERROR: ACCESS DENIED";
            console.error(err);
        }
    });

    function tick() {
        analyser.getByteFrequencyData(dataArray);
        let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;
        let thresh = document.getElementById('threshold').value;
        let resValue = document.getElementById('resonance').value;

        if (volume > thresh) {
            // Dynamic Tone: Blow harder to sweep the filter frequency
            // This mimics the "Ooh" to "Wah" transition
            let targetFreq = 120 + (volume * 12);
            formantFilter.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.05);
            formantFilter.Q.value = resValue;

            // Volume responsiveness
            gainNode.gain.setTargetAtTime(0.8, audioCtx.currentTime, 0.02);
            
            // Visuals
            visualizer.style.opacity = "1";
            visualizer.style.transform = `scale(${1 + (volume/25)})`;
            visualizer.style.filter = `hue-rotate(${volume}deg)`;
        } else {
            gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            visualizer.style.opacity = "0.1";
            visualizer.style.transform = "scale(1)";
        }
        
        requestAnimationFrame(tick);
    }
</script>
</body>
</html>
